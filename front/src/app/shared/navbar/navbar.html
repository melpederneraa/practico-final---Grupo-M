<nav class="navbar navbar-expand-md d-none d-md-flex">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <img src="logo-utn.png" alt="UTN Villa María">
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto ms-3">
        @if (auth.isAuthenticated()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/products" routerLinkActive="active">Productos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/categories" routerLinkActive="active">Categorías</a>
          </li>
          @if (auth.isAdmin()) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">Admin</a>
            </li>
          }
        }
      </ul>

      <ul class="navbar-nav">
        @if (auth.isAuthenticated()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="active">{{ auth.user()?.email }}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="auth.logout(); $event.preventDefault()">Salir</a>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Ingresar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="active">Registrarse</a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
