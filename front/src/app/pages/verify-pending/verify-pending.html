<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-paper display-5" style="color: var(--primary)"></i>
        <h3 class="mt-3 fw-bold">Revisá tu email</h3>
        <p class="text-muted">Te enviamos un link de verificación.</p>
        <button class="btn btn-outline-primary w-100" [disabled]="loading()" (click)="resend()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          Reenviar email
        </button>
      </div>
    </div>
  </div>
</div>
